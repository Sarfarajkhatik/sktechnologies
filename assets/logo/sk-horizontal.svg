<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" aria-labelledby="title">
  <title>SK Technologies — Horizontal Logo</title>
